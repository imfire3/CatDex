# A string used to distinguish different Supabase projects on the same host.
project_id = "catdex"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "catdex://"
additional_redirect_urls = ["catdex://"]

[auth.external.google]
enabled = true

[auth.external.apple]
enabled = true

[storage]
enabled = true
file_size_limit = "10MiB"
